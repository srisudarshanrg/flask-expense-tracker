<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>
            {% block title %}
                
            {% endblock %}
        </title>

        <!-- bootstrap css -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
        <!-- custom css -->
        {% block css %}
            
        {% endblock %}
        <link rel="stylesheet" href="{{url_for('static', filename='css/common.css')}}">

        <!-- favicon -->
        <link rel="icon" href="{{url_for('static', filename='img/favicon.png')}}">
    </head>
    <body>
        {% with msgs = get_flashed_messages(with_categories=True) %}
            {% for category, msg in msgs %}
                <div class="alert alert-{{category}} alert-dismissible fade show" role="alert">
                    {{msg}}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endwith %}

        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTogglerDemo03" aria-controls="navbarTogglerDemo03" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <a class="navbar-brand" href="#">RaptorExpenses</a>      

                <div class="collapse navbar-collapse" id="navbarTogglerDemo03">
                    <form class="d-flex margined" role="search" id="navbar-search-form">
                        <input class="form-control me-2" type="search" placeholder="Search Expense" aria-label="Search">
                        <button class="btn btn-outline-success" type="submit">Search <i class='fa-solid fa-magnifying-glass'></i></button>
                    </form>
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-auto">
                        <li class="nav-item">
                            <a class="nav-link margined" aria-current="page" href="{{url_for('home')}}"><i class="fa-solid fa-house"></i> Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link margined" href="{{url_for('profile')}}"><i class="fa-solid fa-user"></i> Profile</a>
                        </li>
                    </ul>                    
                </div>
            </div>
        </nav>

        {% block content %}
            
        {% endblock %}

        <!-- external js -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
        <script src="https://kit.fontawesome.com/2ce79bf423.js" crossorigin="anonymous"></script>

        <!-- custom js -->
        {% block js %}
        
        {% endblock %}
    </body>
</html>
